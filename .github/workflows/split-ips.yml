name: Split CN IP List

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

# 全局环境变量，强制使用 Node.js 24 运行 Actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  split_ips:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: master # 依然使用你的 master 分支

      - name: Download and Process
        run: |
          # 下载源文件
          URL="https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.list"
          curl -sSL "$URL" -o temp_cn.list

          # 提取 IPv4
          grep -v ":" temp_cn.list > ipv4.txt
          # 提取 IPv6
          grep ":" temp_cn.list > ipv6.txt

          rm temp_cn.list
          echo "拆分完成。"

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add ipv4.txt ipv6.txt
          
          if git diff --cached --quiet; then
            echo "没有变化，跳过提交。"
          else
            git commit -m "Update IP lists (Node24 Environment)"
            git push origin master
          fi
