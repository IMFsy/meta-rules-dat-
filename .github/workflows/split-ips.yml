name: Split CN IP List

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

# 强制使用 Node.js 24 运行，确保环境领先于弃用限期
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  split_ips:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5 # 升级到 v5 以正式支持 Node.js 24
        with:
          ref: master

      - name: Download and Process
        run: |
          # 下载最新的源文件
          URL="https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.list"
          if ! curl -sSL "$URL" -o temp_cn.list; then
            echo "下载失败，请检查网络或 URL。"
            exit 1
          fi

          # 执行拆分逻辑
          grep -v ":" temp_cn.list > ipv4.txt
          grep ":" temp_cn.list > ipv6.txt

          rm temp_cn.list
          echo "IPv4 地址数: $(wc -l < ipv4.txt)"
          echo "IPv6 地址数: $(wc -l < ipv6.txt)"

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add ipv4.txt ipv6.txt
          
          if git diff --cached --quiet; then
            echo "文件无变化，无需提交。"
          else
            git commit -m "Auto-update: Split IP lists (Node24/v5 Environment)"
            git push origin master
          fi
